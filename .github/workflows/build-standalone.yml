name: Build Standalone Packages

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend dist
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r standalone/requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows installer
        shell: pwsh
        run: |
          Set-Location standalone

          # --name CanvaTools 直接命名输出目录，无需 Rename-Item
          python -m PyInstaller -w -D --add-data "../dist;dist" --name CanvaTools main.py

          if (-not (Test-Path "dist\CanvaTools\CanvaTools.exe")) {
            Write-Error "PyInstaller 输出未找到 dist\CanvaTools\CanvaTools.exe"
            Get-ChildItem dist -Recurse | Select-Object FullName | Select-Object -First 30
            exit 1
          }

          New-Item -ItemType Directory -Force -Path "..\installer_out" | Out-Null

          # 生成 Inno Setup 脚本（避免 here-string 导致 YAML 缩进错误，用数组拼接）
          $issLines = @(
            '[Setup]',
            'AppName=Canva Tools',
            'AppVersion=1.0',
            'AppPublisher=CanvaTools',
            'DefaultDirName={autopf}\CanvaTools',
            'DefaultGroupName=Canva Tools',
            'OutputDir=..\installer_out',
            'OutputBaseFilename=CanvaTools_Setup',
            'Compression=lzma',
            'SolidCompression=yes',
            'PrivilegesRequired=lowest',
            '',
            '[Files]',
            'Source: "dist\CanvaTools\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs',
            '',
            '[Icons]',
            'Name: "{group}\Canva Tools"; Filename: "{app}\CanvaTools.exe"',
            'Name: "{commondesktop}\Canva Tools"; Filename: "{app}\CanvaTools.exe"',
            '',
            '[Run]',
            'Filename: "{app}\CanvaTools.exe"; Description: "Start Canva Tools"; Flags: nowait postinstall skipifsilent'
          )
          ($issLines -join "`n") | Set-Content -Encoding UTF8 "installer.iss"

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

          if (-not (Test-Path "..\installer_out\CanvaTools_Setup.exe")) {
            Write-Error "Inno Setup 安装包未生成"
            exit 1
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: CanvaTools_Windows_Installer
          path: installer_out/CanvaTools_Setup.exe

